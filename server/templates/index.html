<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Assistant Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }
        
        .header {
            grid-column: 1 / -1;
            text-align: center;
            color: white;
            margin-bottom: 10px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }
        
        .upload-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            max-height: 400px;
        }
        
        .upload-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .chat-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .chat-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        #chatHistory {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            background-color: #f9f9f9;
        }
        
        #chatHistory::-webkit-scrollbar {
            width: 8px;
        }
        
        #chatHistory::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        #chatHistory::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        
        #chatHistory::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 12px 15px;
            border-radius: 8px;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-in;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: right;
            margin-left: 40px;
        }
        
        .assistant-message {
            background-color: #e8f5e9;
            color: #333;
            margin-right: 40px;
            border-left: 4px solid #4caf50;
        }
        
        .error-message {
            background-color: #ffebee;
            color: #c62828;
            margin-right: 40px;
            border-left: 4px solid #f44336;
        }
        
        .loading-message {
            background-color: #fff3e0;
            color: #e65100;
            margin-right: 40px;
            border-left: 4px solid #ff9800;
        }
        
        .message strong {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .sources {
            font-size: 0.85em;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        
        .sources strong {
            display: inline;
            margin-bottom: 0;
        }
        
        .source-item {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 4px 8px;
            border-radius: 4px;
            margin: 2px 2px 2px 0;
            font-size: 0.8em;
        }
        
        .chat-form {
            display: flex;
            gap: 10px;
        }
        
        #questionInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        #questionInput:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #chatForm button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #chatForm button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        #chatForm button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-bottom: 10px;
        }
        
        #fileInput {
            display: none;
        }
        
        .file-input-label {
            display: block;
            padding: 12px;
            background-color: #f5f5f5;
            border: 2px dashed #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-input-label:hover {
            border-color: #667eea;
            background-color: #f0f4ff;
        }
        
        .file-input-label.dragover {
            border-color: #667eea;
            background-color: #e8eaf6;
        }
        
        #uploadForm button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #uploadForm button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        #uploadForm button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        #uploadStatus {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
        }
        
        .status-success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #4caf50;
        }
        
        .status-error {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #f44336;
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            
            .message {
                margin-left: 0 !important;
                margin-right: 0 !important;
            }
            
            .upload-section {
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🩺 Medical Assistant</h1>
            <p>AI-Powered Medical Document Analysis</p>
        </div>
        
        <div class="upload-section">
            <h2>📄 Upload Documents</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="file-input-wrapper">
                    <label for="fileInput" class="file-input-label" id="fileLabel">
                        📁 Click or drag PDF files here
                    </label>
                    <input type="file" name="files" multiple accept=".pdf" id="fileInput">
                </div>
                <button type="submit" id="uploadBtn">Upload PDFs</button>
            </form>
            <div id="uploadStatus"></div>
        </div>
        
        <div class="chat-section">
            <h2>💬 Chat Assistant</h2>
            <div id="chatHistory"></div>
            <form id="chatForm" class="chat-form">
                <input type="text" id="questionInput" placeholder="Ask a medical question..." required>
                <button type="submit" id="sendBtn">Send</button>
            </form>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const chatForm = document.getElementById('chatForm');
        const questionInput = document.getElementById('questionInput');
        const uploadForm = document.getElementById('uploadForm');
        const uploadStatus = document.getElementById('uploadStatus');
        const sendBtn = document.getElementById('sendBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');

        // Drag and drop functionality
        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.classList.add('dragover');
        });

        fileLabel.addEventListener('dragleave', () => {
            fileLabel.classList.remove('dragover');
        });

        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
        });

        fileLabel.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', () => {
            const fileCount = fileInput.files.length;
            if (fileCount > 0) {
                fileLabel.textContent = `✓ ${fileCount} file(s) selected`;
            } else {
                fileLabel.textContent = '📁 Click or drag PDF files here';
            }
        });

        // Handle chat form submission
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            // Add user message
            addMessage('user', question);
            questionInput.value = '';
            sendBtn.disabled = true;

            // Add loading message
            const loadingId = addLoadingMessage();

            try {
                const response = await fetch('/ask/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({ question })
                });

                // Remove loading message
                removeMessage(loadingId);

                if (response.ok) {
                    const data = await response.json();
                    addMessage('assistant', data.response, data.sources);
                } else {
                    const errorData = await response.json().catch(() => ({ error: response.statusText }));
                    addMessage('error', 'Error: ' + (errorData.error || response.statusText));
                }
            } catch (error) {
                removeMessage(loadingId);
                addMessage('error', 'Error: ' + error.message);
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
            }
        });

        // Handle file upload
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const files = fileInput.files;
            if (!files.length) {
                showUploadStatus('Please select files first', 'error');
                return;
            }

            const formData = new FormData();
            for (let file of files) {
                formData.append('files', file);
            }

            uploadBtn.disabled = true;
            showUploadStatus('Uploading...', 'info');

            try {
                const response = await fetch('/upload_pdfs/', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    showUploadStatus('✓ ' + data.messages, 'success');
                    fileInput.value = '';
                    fileLabel.textContent = '📁 Click or drag PDF files here';
                } else {
                    const errorData = await response.json().catch(() => ({ error: response.statusText }));
                    showUploadStatus('Error: ' + (errorData.error || 'Upload failed'), 'error');
                }
            } catch (error) {
                showUploadStatus('Error: ' + error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
            }
        });

        function addMessage(role, content, sources = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;
            
            let messageHTML = `<strong>${role === 'user' ? 'You' : role === 'error' ? '⚠️ Error' : '🤖 Assistant'}:</strong>`;
            messageHTML += `\n${escapeHtml(content)}`;
            
            messageDiv.innerHTML = messageHTML;
            
            if (sources && sources.length > 0 && role !== 'error') {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'sources';
                sourcesDiv.innerHTML = '<strong>📚 Sources:</strong> ';
                sources.forEach((src, idx) => {
                    const sourceItem = document.createElement('span');
                    sourceItem.className = 'source-item';
                    sourceItem.textContent = src;
                    sourcesDiv.appendChild(sourceItem);
                    if (idx < sources.length - 1) {
                        sourcesDiv.appendChild(document.createTextNode(' '));
                    }
                });
                messageDiv.appendChild(sourcesDiv);
            }
            
            messageDiv.id = `msg-${Date.now()}`;
            chatHistory.appendChild(messageDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return messageDiv.id;
        }

        function addLoadingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message loading-message';
            messageDiv.innerHTML = '<span class="spinner"></span><strong>Thinking...</strong>';
            messageDiv.id = `msg-${Date.now()}`;
            chatHistory.appendChild(messageDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return messageDiv.id;
        }

        function removeMessage(messageId) {
            const msg = document.getElementById(messageId);
            if (msg) msg.remove();
        }

        function showUploadStatus(message, type) {
            uploadStatus.className = `status-${type}`;
            uploadStatus.innerHTML = message;
            uploadStatus.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
